# Factor Mining Workflow - Optimization Agent
# This agent iteratively improves factors based on rank IC feedback:
# 1. Generate factor descriptions
# 2. Generate executable Python code
# 3. Evaluate rank IC
# 4. If IC is good → accept and save the factor
# 5. If IC is poor → provide optimization advice and retry

functions:
  # Factor Optimization Agent - orchestrates the optimization loop
  factor_optimization_agent:
    _type: factor_optimization_agent
    llm_name: nim_llm
    ic_threshold: 0.03           # Minimum |IC| to accept a factor
    p_value_threshold: 0.1       # Maximum p-value for significance
    max_iterations: 5          # Max optimization iterations
    num_factors: 1               # Factors per iteration
    forward_periods: 5           # Days for forward return calculation
    save_results: true           # Save successful factors to disk

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.7
    max_tokens: 4096

# Direct workflow - agent handles the optimization loop internally
workflow:
  _type: factor_optimization_agent
  llm_name: nim_llm
  ic_threshold: 0.03
  p_value_threshold: 0.1
  max_iterations: 3
  num_factors: 1
  forward_periods: 5
  save_results: true
