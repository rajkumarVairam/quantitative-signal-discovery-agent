# Factor Mining Workflow: generate -> code -> evaluate -> feedback loop.
# Run `phoenix serve` in a separate terminal to view traces at localhost:6006.

general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://localhost:6006/v1/traces
        project: factor-mining-workflow

llms:
  factor_generator:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1/"
    temperature: 0.8
    max_tokens: 3000

  code_generator:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1/"
    temperature: 0.0
    max_tokens: 2000

  optimization_advisor:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1/"
    temperature: 0.5
    max_tokens: 1000

workflow:
  _type: factor_optimizer
  factor_generator_llm: factor_generator
  code_generator_llm: code_generator
  optimization_advisor_llm: optimization_advisor
  ic_threshold: 0.02
  p_value_threshold: 0.05
  max_iterations: 3
  num_factors: 2
  forward_periods: 5
  save_results: true
