#
# PR-level continuous integration for the Quantitative Signal Discovery Agent.
#
# Runs on every pull request targeting main, plus on direct pushes to main:
#   1. lint  - fast ruff check (style, unused imports)
#   2. test  - install the package and run pytest

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR / branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run ruff check
        run: ruff check src tests

  test:
    name: Test (pytest, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv and install locked dependencies
        run: uv sync --locked --extra test

      - name: Run pytest
        run: uv run --locked pytest tests/ -v --tb=short
